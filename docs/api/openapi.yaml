    MembersResponse:
      type: object
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberPulse"
    MemberResponse:
      type: object
      required: [member]
      properties:
        member:
          $ref: "#/components/schemas/MemberPulse"
    PersonaActionRequest:
      type: object
      required: [personaId]
