    StandupSubmitResponse:
      type: object
      required: [entry, member]
      properties:
        entry:
          $ref: "#/components/schemas/StandupEntry"
        member:
          $ref: "#/components/schemas/MemberPulse"
    ProjectStandupSubmitResponse:
      type: object
