openapi: 3.0.3
info:
  title: SprintPulse API
  version: 0.2.0
  license:
    name: Private hackathon prototype
  description: |
    OpenAPI contract for the Express routes mounted at `/api` in SprintPulse.

    Production routes accept either `X-SprintPulse-API-Key` for trusted server-to-server callers or
    `Authorization: Bearer <supabase-jwt>` for browser/user calls. Route payloads still carry `personaId`
    to scope role-aware dashboard views and MCP actions.

servers:
  - url: http://localhost:4000/api
    description: Local SprintPulse API
tags:
  - name: System
    description: Runtime health and deprecated session behavior.
  - name: Identity
    description: Personas, profiles, and current-user context.
  - name: Projects
    description: Project discovery, creation, and workspace detail.
  - name: Team
    description: Project team membership and invitations.
  - name: Integrations
    description: Jira, GitHub, and sync operations.
  - name: Dashboard
    description: Team health dashboards and member pulse history.
  - name: AI
    description: AI-enhanced scoring, assistant, and role-aware notifications.
  - name: Standups
    description: Manual standups, transcript parsing, and standup sync.
security:
  - SprintPulseApiKey: []
  - SupabaseBearer: []
paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Check API health and runtime mode.
      security: []
      responses:
        "200":
          description: Runtime health and configuration status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  value:
                    ok: true
                    service: sprintpulse-api
                    dataMode: supabase
                    mockFlowEnabled: false
                    supabase:
                      adminConfigured: true
                      profilesTable: profiles
                    timestamp: "2026-05-12T10:30:00.000Z"
  /personas:
    get:
      tags: [Identity]
      operationId: listPersonas
      summary: List personas visible to the app.
      responses:
        "200":
          description: Personas loaded from seed data or Supabase profiles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonasResponse"
              examples:
                personas:
                  value:
                    personas:
                      - id: priya
                        name: Priya
                        email: priya@sprintpulse.dev
                        initials: PR
                        hackathonRole: architect
                        productPersona: product-owner
                        title: Product Owner
                        accessScope: team
                        focus: Sprint goals, product confidence, and delivery risk.
        "500":
          $ref: "#/components/responses/InternalServerError"
  /notifications:
    get:
      tags: [AI]
      operationId: getProjectNotifications
      summary: Get role-aware notifications for the selected project.
      parameters:
        - $ref: "#/components/parameters/PersonaIdQuery"
        - name: projectId
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/SprintIdQuery"
      responses:
        "200":
          description: Derived notifications for the viewer role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectNotificationsResponse"
        "404":
          $ref: "#/components/responses/ProjectNotVisible"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /users:
    post:
      tags: [Identity]
      operationId: createUserProfile
      summary: Create a self-service user profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserProfileRequest"
            examples:
              developer:
                value:
                  email: nina@sprintpulse.dev
                  name: Nina Patel
                  appRole: developer
                  title: Full-stack Engineer
      responses:
        "201":
          description: Profile and persona created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserProfileResponse"
              examples:
                created:
                  value:
                    profile:
                      id: nina
                      authUserId: auth-nina
                      email: nina@sprintpulse.dev
                      name: Nina Patel
                      initials: NP
                      title: Full-stack Engineer
                      appRole: developer
                      productPersona: developer
                      accessScope: individual
                      status: active
                      createdAt: "2026-05-12T10:30:00.000Z"
                    persona:
                      id: nina
                      name: Nina Patel
                      email: nina@sprintpulse.dev
                      initials: NP
                      hackathonRole: backend
                      productPersona: developer
                      title: Full-stack Engineer
                      accessScope: individual
                      focus: Active sprint delivery.
                    recommendedRoute: /projects
                    warnings: []
        "400":
          description: Name, email, or workspace role is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidProfile:
                  value:
                    error: Name, email, and workspace role are required
        "500":
          description: Profile creation failed while Supabase admin is configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupErrorResponse"
        "503":
          description: Supabase admin configuration is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupErrorResponse"
              examples:
                setupRequired:
                  value:
                    error: Unable to create user profile
                    setup: Create apps/api/.env with SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY, run database/supabase/001_profiles.sql, then restart the API.
  /session:
    post:
      tags: [System]
      operationId: createDeprecatedSession
      summary: Deprecated password sign-in endpoint.
      deprecated: true
      responses:
        "410":
          description: Password sign-in has moved to Supabase Auth.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                gone:
                  value:
                    error: Password sign-in is handled by Supabase Auth.
  /me:
    get:
      tags: [Identity]
      operationId: getCurrentPersona
      summary: Resolve persona, permissions, and accessible project ids.
      parameters:
        - $ref: "#/components/parameters/PersonaIdQuery"
      responses:
        "200":
          description: Current persona context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentPersonaResponse"
              examples:
                currentPersona:
                  value:
                    persona:
                      id: priya
                      name: Priya
                      email: priya@sprintpulse.dev
                      initials: PR
                      hackathonRole: architect
                      productPersona: product-owner
                      title: Product Owner
                      accessScope: team
                      focus: Sprint goals, product confidence, and delivery risk.
                    permissions:
                      - project:view
                      - project:create
                      - project:connect
                    accessibleProjectIds:
                      - sp-core
        "404":
          description: Persona or Supabase profile was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: Persona not found
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects visible to a persona.
      parameters:
        - $ref: "#/components/parameters/PersonaIdQuery"
      responses:
        "200":
          description: Project list and creation/connect capabilities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsResponse"
              examples:
                projects:
                  value:
                    viewer:
                      id: priya
                      name: Priya
                      email: priya@sprintpulse.dev
                      initials: PR
                      hackathonRole: architect
                      productPersona: product-owner
                      title: Product Owner
                      accessScope: team
                      focus: Sprint goals, product confidence, and delivery risk.
                    projects:
                      - id: sp-core
                        key: SP
                        name: SprintPulse AI
                        source: jira
                        sprintName: Semicolon Build Sprint
                        sprintGoal: Prove say-do gap detection from standups, Jira, and delivery signals.
                        memberCount: 9
                        healthScore: 82
                        atRiskCount: 2
                        currentUserRole: product-owner
                        permissions:
                          - project:view
                          - project:create
                          - project:connect
                        lastSyncAt: "2026-05-11T15:30:00.000Z"
                    canCreateProject: true
                    canConnectProject: true
                    recommendedProjectId: sp-core
        "404":
          $ref: "#/components/responses/PersonaNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a manual project and active sprint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            examples:
              manualProject:
                value:
                  personaId: priya
                  projectName: SprintPulse Experience
                  projectKey: UX
                  sprintName: Judge Experience Sprint
                  sprintGoal: Make the product journey polished and role-aware.
                  startDate: "2026-05-11"
                  endDate: "2026-05-15"
                  members:
                    - personaId: priya
                      name: Priya
                      email: priya@sprintpulse.dev
                      initials: PR
                      role: product-owner
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
        "400":
          description: Required project or sprint fields are missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingProjectFields:
                  value:
                    error: Project name, key, sprint name, and sprint goal are required
        "403":
          description: Persona is not allowed to create projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    error: You do not have permission to create projects
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/connect/jira:
    post:
      tags: [Projects, Integrations]
      operationId: connectJiraProject
      summary: Create a project from a Jira connection in mock flow.
      description: In Supabase data mode this route returns `501`; configure Jira on an existing project instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JiraConnectRequest"
            examples:
              jiraProject:
                value:
                  personaId: priya
                  jiraSite: semicolons.atlassian.net
                  projectKey: SP
      responses:
        "201":
          description: Jira-backed project connected in mock flow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JiraConnectResponse"
        "403":
          $ref: "#/components/responses/ConnectForbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /projects/{projectId}:
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get project detail visible to a persona.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
      responses:
        "200":
          description: Project detail and permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetailResponse"
        "404":
          $ref: "#/components/responses/ProjectNotVisible"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/workspace:
    get:
      tags: [Projects]
      operationId: getProjectWorkspace
      summary: Get the project workspace summary and next actions.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
      responses:
        "200":
          description: Project workspace state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWorkspaceResponse"
        "404":
          description: Project workspace is not found or not visible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notVisible:
                  value:
                    error: Project workspace not found or not visible to this user
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/ops:
    get:
      tags: [Projects, Integrations]
      operationId: getProjectOps
      summary: Get sprint operations, health summary, and integration runs.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
      responses:
        "200":
          description: Operations response. Mock flow includes workspace fields in addition to operations fields.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectOpsResponse"
                  - $ref: "#/components/schemas/MockProjectOpsResponse"
        "404":
          description: Project operations are not found or not visible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notVisible:
                  value:
                    error: Project operations not found or not visible to this user
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/sprints:
    get:
      tags: [Projects]
      operationId: listProjectSprints
      summary: List project sprints and the current sprint summary.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
      responses:
        "200":
          description: Sprint summaries for the project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SprintListResponse"
        "404":
          description: Sprints are not found or not visible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notVisible:
                  value:
                    error: Sprints not found or not visible to this user
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/team:
    get:
      tags: [Team]
      operationId: getProjectTeam
      summary: Get project team members and pending invites.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
      responses:
        "200":
          description: Team membership and edit capability.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "404":
          description: Team is not found or not visible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notVisible:
                  value:
                    error: Team not found or not visible to this user
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Team]
      operationId: addProjectMemberViaTeam
      summary: Add or invite a project member.
      description: Alias of `POST /projects/{projectId}/invites`. In mock flow this route returns `501`.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        $ref: "#/components/requestBodies/InviteProjectMemberBody"
      responses:
        "201":
          description: Project member invited or linked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteProjectMemberResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /projects/{projectId}/invites:
    post:
      tags: [Team]
      operationId: inviteProjectMember
      summary: Invite or upsert a project member.
      description: In mock flow this route returns `501`.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        $ref: "#/components/requestBodies/InviteProjectMemberBody"
      responses:
        "201":
          description: Project member invited or linked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteProjectMemberResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /projects/{projectId}/team/{profileId}:
    patch:
      tags: [Team]
      operationId: updateProjectMember
      summary: Update a project member's role or integration handles.
      description: In mock flow this route returns `501`.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/ProfileIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectMemberRequest"
            examples:
              updateMember:
                value:
                  personaId: priya
                  role: scrum-master
                  jiraAccountId: himanshu.atlassian
                  githubUsername: himanshu-sp
      responses:
        "200":
          description: Updated team response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "404":
          description: Team member is not found or not visible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notVisible:
                  value:
                    error: Team member not found or not visible to this user
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /projects/{projectId}/integrations:
    get:
      tags: [Integrations]
      operationId: getProjectIntegrations
      summary: Get Jira, GitHub, recent sync runs, and signal previews.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
      responses:
        "200":
          description: Integration status and previews.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationStatusResponse"
        "404":
          description: Integrations are not found or not visible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notVisible:
                  value:
                    error: Integrations not found or not visible to this user
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/jira/configure:
    post:
      tags: [Integrations]
      operationId: configureProjectJira
      summary: Configure Jira for a project.
      description: Saves Jira site and project key metadata. In mock flow this route returns `501`.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureJiraRequest"
            examples:
              configureJira:
                value:
                  personaId: priya
                  jiraSite: semicolons.atlassian.net
                  projectKey: SP
      responses:
        "200":
          description: Jira connection configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureJiraResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /projects/{projectId}/jira/oauth/start:
    post:
      tags: [Integrations]
      operationId: startProjectJiraOAuth
      summary: Start Atlassian OAuth for a project Jira connection.
      description: Returns the Atlassian authorization URL. In mock flow this route returns `501`.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JiraOAuthStartRequest"
            examples:
              startJiraOAuth:
                value:
                  personaId: priya
                  jiraSite: semicolons.atlassian.net
                  projectKey: SP
      responses:
        "200":
          description: Jira OAuth authorization URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JiraOAuthStartResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /jira/oauth/callback:
    get:
      tags: [Integrations]
      operationId: completeJiraOAuth
      summary: Complete Atlassian OAuth callback.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirects back to the web app integrations page.
        "400":
          description: Missing OAuth code or state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{projectId}/jira/sync:
    post:
      tags: [Integrations]
      operationId: syncProjectJira
      summary: Import Jira sprint issue signals for a project.
      description: Requires a completed Atlassian OAuth connection. In mock flow this route returns `501`.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        $ref: "#/components/requestBodies/PersonaActionBody"
      responses:
        "200":
          description: Jira sync completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureJiraResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /projects/{projectId}/git/configure:
    post:
      tags: [Integrations]
      operationId: configureProjectGit
      summary: Configure GitHub repository metadata for a project.
      description: In mock flow this route returns `501`.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureGitRequest"
            examples:
              configureGit:
                value:
                  personaId: priya
                  provider: github
                  repoOwner: semicolons
                  repoName: sprintpulse
                  defaultBranch: main
      responses:
        "200":
          description: GitHub connection configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureGitResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /projects/{projectId}/git/sync:
    post:
      tags: [Integrations]
      operationId: syncProjectGit
      summary: Import GitHub commit signals for a project.
      description: In mock flow this route returns `501`.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        $ref: "#/components/requestBodies/PersonaActionBody"
      responses:
        "200":
          description: Git sync completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureGitResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /projects/{projectId}/dashboard:
    get:
      tags: [Dashboard]
      operationId: getProjectDashboard
      summary: Get a project-scoped sprint health dashboard.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
        - $ref: "#/components/parameters/SprintIdQuery"
      responses:
        "200":
          description: Project dashboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDashboardResponse"
        "404":
          description: Project dashboard is not found or not visible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notVisible:
                  value:
                    error: Project dashboard not found or not visible to this user
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/ai/refresh:
    post:
      tags: [AI]
      operationId: refreshProjectAiInsights
      summary: Refresh AI-generated scoring and recommendations for a project.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [personaId]
              properties:
                personaId:
                  type: string
                sprintId:
                  type: string
      responses:
        "200":
          description: AI-enhanced project dashboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDashboardResponse"
        "404":
          $ref: "#/components/responses/ProjectNotVisible"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/ai/chat:
    post:
      tags: [AI]
      operationId: chatWithProjectAi
      summary: Ask the SprintPulse AI assistant about a project.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: AI assistant response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/ProjectNotVisible"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/members/{memberId}/history:
    get:
      tags: [Dashboard]
      operationId: getProjectMemberHistory
      summary: Get detailed member pulse history with issues, commits, recommendations, and standups.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/MemberIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
        - $ref: "#/components/parameters/SprintIdQuery"
      responses:
        "200":
          description: Member pulse history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberPulseHistoryResponse"
        "403":
          $ref: "#/components/responses/OwnMemberOnly"
        "404":
          $ref: "#/components/responses/MemberNotVisible"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/members/{memberId}:
    get:
      tags: [Dashboard]
      operationId: getProjectMemberPulse
      summary: Get a member pulse and project context.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/MemberIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
        - $ref: "#/components/parameters/SprintIdQuery"
      responses:
        "200":
          description: Member pulse with project context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberPulseResponse"
        "403":
          $ref: "#/components/responses/OwnMemberOnly"
        "404":
          $ref: "#/components/responses/MemberNotVisible"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/standups:
    get:
      tags: [Standups]
      operationId: listProjectStandups
      summary: List standups for a project sprint.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PersonaIdQuery"
        - $ref: "#/components/parameters/SprintIdQuery"
      responses:
        "200":
          description: Project standups. Mock flow returns a smaller project-plus-standups payload.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectStandupsResponse"
                  - $ref: "#/components/schemas/MockProjectStandupsResponse"
        "404":
          description: Standups are not found or not visible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notVisible:
                  value:
                    error: Standups not found or not visible to this user
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Standups]
      operationId: submitProjectStandup
      summary: Submit a manual standup for a project.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        $ref: "#/components/requestBodies/StandupSubmitBody"
      responses:
        "201":
          description: Standup accepted and member pulse refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStandupSubmitResponse"
        "400":
          $ref: "#/components/responses/StandupValidation"
        "403":
          description: Persona cannot submit standups for this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    error: You do not have permission to submit standups for this project
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/transcripts/parse:
    post:
      tags: [Standups]
      operationId: parseProjectTranscript
      summary: Parse transcript text into project standup entries.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectTranscriptParseRequest"
            examples:
              transcript:
                value:
                  personaId: priya
                  transcript: "Priya: Yesterday I finalized sprint goals. Today I am reviewing risks. Blockers none."
      responses:
        "200":
          description: Transcript parsed into standup entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTranscriptParseResponse"
        "400":
          $ref: "#/components/responses/TranscriptValidation"
        "404":
          description: Project was not found in mock flow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                projectNotFound:
                  value:
                    error: Project not found
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/webhook-tokens:
    get:
      tags: [Integrations]
      operationId: listProjectWebhookTokens
      summary: List active webhook auth tokens for a project.
      description: |
        Returns the active (non-revoked) webhook tokens minted for this
        project. Plaintext is never returned — only metadata + the last 4
        characters of the original token as a hint so the UI can distinguish
        tokens visually. Requires the caller to be a project member with
        manager-tier role (product-owner, scrum-master, engineering-manager,
        architect) or the project creator.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - in: query
          name: personaId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of active tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWebhookTokensResponse"
        "403":
          description: Caller is not authorized to manage tokens for this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          description: Mock mode is enabled; webhook tokens require Supabase mode.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Supabase admin client is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Integrations]
      operationId: createProjectWebhookToken
      summary: Mint a new webhook auth token for a project.
      description: |
        Generates a fresh `sptk_…` token, stores its SHA-256 hash, and returns
        the plaintext ONCE in the response body. The plaintext is never
        retrievable again — clients must capture and store it immediately.
        Each token is project-scoped and individually revokable.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookTokenRequest"
            examples:
              powerAutomate:
                value:
                  personaId: yash
                  name: Power Automate flow
      responses:
        "201":
          description: Token minted. Plaintext is in `plaintextToken` and will not be shown again.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWebhookTokenResponse"
        "400":
          description: Token name is missing or too long (>80 chars).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not authorized to mint tokens for this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/webhook-tokens/{tokenId}:
    delete:
      tags: [Integrations]
      operationId: revokeProjectWebhookToken
      summary: Revoke a webhook auth token.
      description: |
        Marks the token as revoked. Future calls carrying this token return
        401. The row is kept (not hard-deleted) so audits can trace which
        token was used when.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - in: path
          name: tokenId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: personaId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Token revoked.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "403":
          description: Caller is not authorized to revoke tokens for this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /projects/{projectId}/transcripts/teams-webhook:
    post:
      tags: [Standups, Integrations]
      operationId: ingestTeamsTranscript
      summary: Ingest a Microsoft Teams meeting transcript and auto-create standups.
      description: |
        Webhook endpoint designed to be called by an external delivery
        mechanism (Power Automate flow, Otter.ai / Fireflies.ai bot, a custom
        Microsoft Graph poller, or any HTTP client) when a Teams meeting
        transcript becomes available. Accepts either WebVTT (the default Teams
        export format) or plain `Speaker:` text and feeds it through the same
        parser used by the manual paste flow.

        Authorization: this route is unauthenticated, but the `organizerEmail`
        must match a profile that is a member of the project. Requests from
        organizers outside the project return 404. For production hardening,
        gate this behind a shared-secret header (`X-SprintPulse-Webhook-Token`).

        Returns 501 when `ENABLE_MOCK_FLOW=true` since the route writes to
        Supabase.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamsWebhookRequest"
            examples:
              vtt:
                summary: Microsoft Teams WebVTT export
                value:
                  organizerEmail: yash@sprintpulse.dev
                  meetingSubject: SCRUM Daily Standup
                  meetingId: 19:meeting_abc123@thread.v2
                  transcript: |
                    WEBVTT

                    1
                    00:00:01.000 --> 00:00:08.000
                    <v Yash>Yesterday I shipped the dashboard refactor. Today I am wiring Teams ingestion. No blockers.

                    2
                    00:00:09.000 --> 00:00:14.000
                    <v Yanshi>Yesterday I reviewed AI scoring tests. Today I will polish the integrations page. Blocked on Jira keys.
              plainText:
                summary: Plain text with Speaker markers
                value:
                  organizerEmail: yash@sprintpulse.dev
                  meetingSubject: SCRUM Daily Standup
                  transcript: |
                    Yash: Yesterday I shipped the dashboard refactor. Today I am wiring Teams ingestion. No blockers.
                    Yanshi: Yesterday I reviewed AI scoring tests. Today I will polish the integrations page. Blocked on Jira keys.
      responses:
        "201":
          description: Transcript parsed and standup entries persisted to the active sprint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsWebhookResponse"
        "400":
          description: Required fields are missing from the body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                noTranscript:
                  value:
                    error: transcript is required
                noOrganizer:
                  value:
                    error: organizerEmail is required
        "404":
          description: Organizer is not a member of the target project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                organizerNotMember:
                  value:
                    error: "No project member matches organizer alice@example.com. The meeting organizer must be a member of this project."
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          description: Webhook is disabled because the API is running in mock-data mode.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                mockMode:
                  value:
                    error: Teams webhook is only available in real-data mode.
  /projects/{projectId}/standups/sync:
    post:
      tags: [Standups, Integrations]
      operationId: syncProjectStandups
      summary: Sync or backfill project standup entries.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        $ref: "#/components/requestBodies/PersonaActionBody"
      responses:
        "200":
          description: Standup sync completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandupsSyncResponse"
        "403":
          description: Persona cannot sync standups for this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    error: You do not have permission to sync standups for this project
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    SprintPulseApiKey:
      type: apiKey
      in: header
      name: X-SprintPulse-API-Key
      description: Shared server-to-server key used by MCP and trusted backend callers.
    SupabaseBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase user JWT sent by the browser client.
  parameters:
    PersonaIdQuery:
      name: personaId
      in: query
      required: true
      description: Persona/profile id used by SprintPulse to resolve viewer permissions.
      schema:
        type: string
      example: priya
    SprintIdQuery:
      name: sprintId
      in: query
      required: false
      description: Optional sprint id filter for Supabase-backed sprint data.
      schema:
        type: string
      example: sprint-semi-2026
    ProjectIdPath:
      name: projectId
      in: path
      required: true
      description: Project id or, in mock flow, case-insensitive project key.
      schema:
        type: string
      example: sp-core
    MemberIdPath:
      name: memberId
      in: path
      required: true
      description: Member pulse id or persona id.
      schema:
        type: string
      example: yash
    ProfileIdPath:
      name: profileId
      in: path
      required: true
      description: Profile id of the project member to update.
      schema:
        type: string
      example: himanshu
  requestBodies:
    InviteProjectMemberBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InviteProjectMemberRequest"
          examples:
            inviteDeveloper:
              value:
                personaId: priya
                email: dev@sprintpulse.dev
                name: Dev Sharma
                appRole: developer
                projectRole: developer
                title: Full-stack Engineer
                jiraAccountId: dev.atlassian
                githubUsername: dev-sp
    PersonaActionBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PersonaActionRequest"
          examples:
            actor:
              value:
                personaId: priya
    StandupSubmitBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandupSubmitRequest"
          examples:
            standup:
              value:
                personaId: yash
                yesterday: Finalized API contracts.
                today: Connecting scoring with dashboard data.
                blockers: No blocker.
  responses:
    InternalServerError:
      description: The route failed while loading or mutating data.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internal:
              value:
                error: Unable to load data
    BadRequest:
      description: The request body or query is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotImplemented:
      description: Route is not available in the current runtime mode.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notImplemented:
              value:
                error: Supabase data mode is enabled, but this route still needs its database-backed adapter.
    PersonaNotFound:
      description: Persona or profile was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            personaNotFound:
              value:
                error: Persona not found
    ProjectNotVisible:
      description: Project is not found or not visible to the viewer.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            projectNotVisible:
              value:
                error: Project not found or not visible to this user
    MemberNotVisible:
      description: Member is not found or not visible to the viewer.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            memberNotVisible:
              value:
                error: Member not found or not visible to this user
    OwnMemberOnly:
      description: Persona can only view its own member pulse.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            ownMemberOnly:
              value:
                error: This role can only view its own member pulse
    ConnectForbidden:
      description: Persona is not allowed to connect Jira projects.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              value:
                error: You do not have permission to connect Jira projects
    StandupValidation:
      description: Standup body is missing required text fields.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missingStandupText:
              value:
                error: Yesterday and today fields are required
    TranscriptValidation:
      description: Transcript text is empty.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            transcriptRequired:
              value:
                error: Transcript text is required
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Persona not found
    SetupErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            setup:
              type: string
    HealthResponse:
      type: object
      required: [ok, service, dataMode, mockFlowEnabled, supabase, timestamp]
      properties:
        ok:
          type: boolean
        service:
          type: string
          enum: [sprintpulse-api]
        dataMode:
          type: string
          enum: [seeded, supabase]
        mockFlowEnabled:
          type: boolean
        supabase:
          type: object
          required: [adminConfigured, profilesTable]
          properties:
            adminConfigured:
              type: boolean
            profilesTable:
              type: string
        ai:
          type: object
          properties:
            requested:
              type: boolean
            configured:
              type: boolean
            model:
              type: string
            configError:
              type: string
        timestamp:
          type: string
          format: date-time
    HackathonRole:
      type: string
      enum: [frontend, backend, architect, qa]
    ProductPersona:
      type: string
      enum: [product-owner, engineering-manager, scrum-master, developer, qa-lead, presenter]
    AccessScope:
      type: string
      enum: [team, individual, quality, presentation]
    AppRole:
      type: string
      enum: [admin, product-owner, engineering-manager, scrum-master, developer, qa-lead]
    Permission:
      type: string
      enum:
        - project:view
        - project:create
        - project:connect
        - project:editTeam
        - standup:submit
        - standup:sync
        - dashboard:viewTeam
        - dashboard:viewOwn
        - member:viewTeam
        - member:viewOwn
    ProjectRole:
      type: string
      enum: [product-owner, scrum-master, engineering-manager, architect, developer, qa]
    ProjectSource:
      type: string
      enum: [manual, jira]
    RiskLevel:
      type: string
      enum: [low, medium, high, critical]
    FlagType:
      type: string
      enum:
        - VAGUE_UPDATE
        - STALE_WORK
        - COPY_PASTE
        - SAY_DO_GAP
        - BLOCKER_ANOMALY
        - BURNOUT_SIGNAL
        - TEST_RISK
    SyncSource:
      type: string
      enum: [jira, git, standup, recommendation]
    SyncRunStatus:
      type: string
      enum: [queued, running, succeeded, failed]
    IntegrationStatus:
      type: string
      enum: [not-configured, configured, synced, failed]
    IssueStatus:
      type: string
      enum: [Todo, In Progress, Review, Blocked, Done]
    Persona:
      type: object
      required: [id, name, email, initials, hackathonRole, productPersona, title, accessScope, focus]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        initials:
          type: string
        hackathonRole:
          $ref: "#/components/schemas/HackathonRole"
        productPersona:
          $ref: "#/components/schemas/ProductPersona"
        title:
          type: string
        accessScope:
          $ref: "#/components/schemas/AccessScope"
        focus:
          type: string
    PersonasResponse:
      type: object
      required: [personas]
      properties:
        personas:
          type: array
          items:
            $ref: "#/components/schemas/Persona"
    UserProfile:
      type: object
      required: [id, email, name, initials, title, appRole, productPersona, accessScope, status, createdAt]
      properties:
        id:
          type: string
        authUserId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        initials:
          type: string
        title:
          type: string
        appRole:
          $ref: "#/components/schemas/AppRole"
        productPersona:
          $ref: "#/components/schemas/ProductPersona"
        accessScope:
          $ref: "#/components/schemas/AccessScope"
        status:
          type: string
          enum: [active, invited]
        createdAt:
          type: string
          format: date-time
        invitedBy:
          type: string
    CreateUserProfileRequest:
      type: object
      required: [email, name, appRole]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        appRole:
          $ref: "#/components/schemas/AppRole"
        title:
          type: string
        authUserId:
          type: string
    CreateUserProfileResponse:
      type: object
      required: [profile, persona, recommendedRoute, warnings]
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        persona:
          $ref: "#/components/schemas/Persona"
        recommendedRoute:
          type: string
        warnings:
          type: array
          items:
            type: string
        linkedSyncs:
          type: array
          description: Parallel evidence sync results for the other project signal sources.
          items:
            $ref: "#/components/schemas/ProjectSignalSyncStatus"
    CurrentPersonaResponse:
      type: object
      required: [persona, permissions, accessibleProjectIds]
      properties:
        persona:
          $ref: "#/components/schemas/Persona"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        accessibleProjectIds:
          type: array
          items:
            type: string
    ProjectMember:
      type: object
      required: [personaId, name, email, initials, role]
      properties:
        personaId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        initials:
          type: string
        role:
          $ref: "#/components/schemas/ProjectRole"
        jiraAccountId:
          type: string
        githubUsername:
          type: string
    SprintInfo:
      type: object
      required: [id, name, goal, startDate, endDate, status]
      properties:
        id:
          type: string
        name:
          type: string
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [planned, active, closed]
    SprintProject:
      type: object
      required: [id, key, name, source, sprint, members, ownerIds, scrumMasterIds, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        source:
          $ref: "#/components/schemas/ProjectSource"
        jiraSite:
          type: string
        sprint:
          $ref: "#/components/schemas/SprintInfo"
        members:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMember"
        ownerIds:
          type: array
          items:
            type: string
        scrumMasterIds:
          type: array
          items:
            type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastSyncAt:
          type: string
          format: date-time
    ProjectSummary:
      type: object
      required: [id, key, name, source, sprintName, sprintGoal, memberCount, healthScore, atRiskCount, currentUserRole, permissions]
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        source:
          $ref: "#/components/schemas/ProjectSource"
        sprintName:
          type: string
        sprintGoal:
          type: string
        memberCount:
          type: integer
          minimum: 0
        healthScore:
          type: integer
          minimum: 0
          maximum: 100
        atRiskCount:
          type: integer
          minimum: 0
        currentUserRole:
          $ref: "#/components/schemas/ProjectRole"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        lastSyncAt:
          type: string
          format: date-time
    ProjectsResponse:
      type: object
      required: [viewer, projects, canCreateProject, canConnectProject]
      properties:
        viewer:
          $ref: "#/components/schemas/Persona"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
        canCreateProject:
          type: boolean
        canConnectProject:
          type: boolean
        recommendedProjectId:
          type: string
    ProjectDetailResponse:
      type: object
      required: [viewer, project, permissions]
      properties:
        viewer:
          $ref: "#/components/schemas/Persona"
        project:
