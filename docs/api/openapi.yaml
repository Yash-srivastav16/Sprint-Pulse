          $ref: "#/components/schemas/AiDashboardOverlay"
        aiMeta:
          $ref: "#/components/schemas/AiGenerationMeta"
    ProjectDashboardResponse:
      allOf:
        - $ref: "#/components/schemas/DashboardResponse"
        - type: object
          required: [project]
          properties:
            project:
              $ref: "#/components/schemas/SprintProject"
    ProjectMemberPulseResponse:
