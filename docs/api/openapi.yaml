          $ref: "#/components/schemas/MemberPulse"
        project:
          $ref: "#/components/schemas/SprintProject"
    TranscriptParseRequest:
      type: object
      required: [transcript]
      properties:
        transcript:
          type: string
    ProjectTranscriptParseRequest:
      allOf:
        - $ref: "#/components/schemas/TranscriptParseRequest"
        - type: object
          properties:
            personaId:
              type: string
    ParsedTranscriptEntry:
      type: object
      required: [memberId, name, yesterday, today, blockers, confidence]
      properties:
        memberId:
          type: string
        name:
          type: string
        yesterday:
          type: string
        today:
          type: string
        blockers:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
    DailyStatusRisk:
      type: object
      required: [id, type, severity, title, message, evidence]
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - STATUS_MISMATCH
            - UNCLEAR_REQUIREMENT
            - DEPENDENCY_WAIT
            - TECHNICAL_CHALLENGE
            - SYSTEM_ISSUE
            - SOFTWARE_ISSUE
            - QA_NOT_DONE
            - CODE_REVIEW_PENDING
            - SPRINT_END_RISK
        severity:
          type: string
          enum: [watch, impediment, red-flag]
        title:
          type: string
        message:
          type: string
        ownerId:
          type: string
        ownerName:
          type: string
        storyKey:
          type: string
        evidence:
          type: array
          items:
            type: string
        transferSuggestion:
          type: object
          required: [shouldTransfer, reason]
          properties:
            shouldTransfer:
              type: boolean
            toMemberId:
              type: string
            toMemberName:
              type: string
            toRole:
              type: string
              enum: [product-owner, scrum-master, engineering-manager, architect, developer, qa]
            reason:
              type: string
    UserStoryConfidence:
      type: object
      required: [storyKey, title, standupStatus, confidenceScore, canFinishInSprint, reason, riskTypes, evidence]
      properties:
        storyKey:
          type: string
        title:
          type: string
        ownerId:
          type: string
        ownerName:
          type: string
        jiraStatus:
          type: string
          enum: [Todo, In Progress, Review, Blocked, Done]
        standupStatus:
          type: string
          enum: [todo, in-progress, blocked, review, done, unclear]
        confidenceScore:
          type: integer
          minimum: 0
          maximum: 100
        canFinishInSprint:
          type: boolean
        reason:
          type: string
        riskTypes:
          type: array
          items:
            type: string
            enum:
              - STATUS_MISMATCH
              - UNCLEAR_REQUIREMENT
              - DEPENDENCY_WAIT
              - TECHNICAL_CHALLENGE
              - SYSTEM_ISSUE
              - SOFTWARE_ISSUE
              - QA_NOT_DONE
              - CODE_REVIEW_PENDING
              - SPRINT_END_RISK
        evidence:
          type: array
          items:
            type: string
    DailyStatusAnalysis:
      type: object
      required: [generatedAt, sprintId, daysRemaining, isSprintEndingSoon, summary, risks, stories]
      properties:
        generatedAt:
          type: string
          format: date-time
        sprintId:
          type: string
        daysRemaining:
          type: integer
          minimum: 0
        isSprintEndingSoon:
          type: boolean
        summary:
          type: object
          required: [storyCount, redFlagCount, impedimentCount, averageConfidence, canCompleteSprint, transferSuggestionCount]
          properties:
            storyCount:
              type: integer
            redFlagCount:
              type: integer
            impedimentCount:
              type: integer
            averageConfidence:
              type: integer
              minimum: 0
              maximum: 100
            canCompleteSprint:
              type: boolean
            transferSuggestionCount:
              type: integer
              minimum: 0
        risks:
          type: array
          items:
            $ref: "#/components/schemas/DailyStatusRisk"
        stories:
          type: array
          items:
            $ref: "#/components/schemas/UserStoryConfidence"
        meta:
          $ref: "#/components/schemas/AiGenerationMeta"
    TranscriptParseResponse:
      type: object
      required: [mode, note, parsed]
      properties:
        mode:
          type: string
          example: transcript-parser
        note:
          type: string
        parsed:
          type: array
          items:
            $ref: "#/components/schemas/ParsedTranscriptEntry"
        analysis:
          $ref: "#/components/schemas/DailyStatusAnalysis"
        aiMeta:
          $ref: "#/components/schemas/AiGenerationMeta"
    ProjectTranscriptParseResponse:
      allOf:
        - $ref: "#/components/schemas/TranscriptParseResponse"
        - type: object
          required: [project]
          properties:
            project:
              $ref: "#/components/schemas/SprintProject"
    WebhookToken:
      type: object
      required: [id, projectId, name, tokenHint, createdAt, lastUsedAt, createdByProfileId, revokedAt]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        name:
          type: string
          example: Power Automate flow
        tokenHint:
          type: string
          description: Last 4 chars of the plaintext, for UI display only.
          example: mP3a
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdByProfileId:
          type: string
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
    CreateWebhookTokenRequest:
      type: object
      required: [personaId, name]
      properties:
        personaId:
          type: string
        name:
          type: string
          maxLength: 80
          description: Human-readable label so the SM can identify which integration uses this token.
    CreateWebhookTokenResponse:
      type: object
      required: [token, plaintextToken]
      properties:
        token:
          $ref: "#/components/schemas/WebhookToken"
        plaintextToken:
          type: string
          description: |
            The actual secret value, prefixed `sptk_`. Returned ONLY at mint
            time — never again. Callers must capture and store it immediately;
            the server keeps only a SHA-256 hash.
          example: sptk_AbCdEfGhIjKlMnOpQrStUvWxYz123456
    ListWebhookTokensResponse:
      type: object
      required: [tokens]
      properties:
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/WebhookToken"
    TeamsWebhookRequest:
      type: object
      required: [organizerEmail, transcript]
      properties:
        organizerEmail:
          type: string
          format: email
          description: |
            UPN / email of the meeting organizer. Must match the `email`
            field on an active profile that belongs to the target project.
            Acts as the implicit authorization signal — requests from
            organizers outside the project are rejected with 404.
          example: yash@sprintpulse.dev
        transcript:
          type: string
          description: |
            Transcript body. Accepts WebVTT (with `WEBVTT` header, cue
            numbers, timestamp ranges, and `<v Speaker>` tags) or plain
            text with `Speaker:` markers. Both formats flow through the
            same server-side parser.
        meetingSubject:
          type: string
          description: Title of the Teams meeting (optional, echoed back in response).
          example: SCRUM Daily Standup
        meetingId:
          type: string
          description: |
            Stable Teams meeting identifier (optional). When provided, it
            can be used by callers to deduplicate retries.
          example: 19:meeting_abc123@thread.v2
    TeamsWebhookResponse:
      allOf:
        - $ref: "#/components/schemas/ProjectTranscriptParseResponse"
        - type: object
          required: [source, organizerEmail]
          properties:
            source:
              type: string
              enum: [teams-webhook]
              description: Constant value identifying this ingestion path.
            organizerEmail:
              type: string
              format: email
            meetingSubject:
              type: string
            meetingId:
              type: string
    StandupsSyncResponse:
      type: object
      required: [project, syncedAt, importedStandups, warnings]
      properties:
        project:
          $ref: "#/components/schemas/SprintProject"
        syncedAt:
          type: string
          format: date-time
        importedStandups:
          type: integer
          minimum: 0
        warnings:
          type: array
          items:
            type: string
        linkedSyncs:
          type: array
          description: Parallel evidence sync results for Jira and Git when standups are synced.
          items:
            $ref: "#/components/schemas/ProjectSignalSyncStatus"
    ProjectSignalSyncStatus:
      type: object
      required: [source, status]
      properties:
        source:
          type: string
          enum: [standup, jira, git]
        status:
          type: string
          enum: [succeeded, failed]
        importedCount:
          type: integer
          minimum: 0
        warning:
          type: string
    StackItem:
      type: object
      required: [layer, choice, reason]
      properties:
        layer:
          type: string
        choice:
          type: string
        reason:
          type: string
    Assignment:
      type: object
      required: [owner, role, workstream, firstDeliverable]
      properties:
        owner:
          type: string
        role:
          $ref: "#/components/schemas/HackathonRole"
        workstream:
          type: string
        firstDeliverable:
          type: string
    PlanResponse:
      type: object
      required: [stack, assignments, milestones]
      properties:
        stack:
          type: array
          items:
            $ref: "#/components/schemas/StackItem"
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/Assignment"
        milestones:
          type: array
          items:
            type: object
            required: [date, target]
            properties:
              date:
                type: string
              target:
                type: string
